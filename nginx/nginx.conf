user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Performance
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;

    # Observabilidade (logs de acesso)
    log_format  main  '$remote_addr - $remote_user [$time_local] '
                      '"$request" $status $body_bytes_sent '
                      '"$http_referer" "$http_user_agent" '
                      '"$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    # Limites de payload globais
    client_max_body_size    20m;   # limite padrão de payload
    client_body_buffer_size 128k;

    # Rate limiting por IP para rotas da API/ETL
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # Gzip para ganhar performance em respostas de texto/JSON
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xhtml+xml
        application/rss+xml
        application/atom+xml
        font/ttf
        font/otf
        image/svg+xml;

    # Upstreams dos serviços Java no docker-compose
    upstream java_api_upstream {
        server java_api:8080;
        keepalive 32;
    }

    upstream etl_java_upstream {
        server etl_java:8081;
        keepalive 8;
    }

    server {
        listen       80;
        server_name  _;

        root   /usr/share/nginx/html;
        index  index.html index.htm;

        # Cabeçalhos de segurança básicos (não quebram SPA)
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        # CSP permitindo Google Fonts e imagens do Unsplash
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https://images.unsplash.com; font-src 'self' data: https://fonts.gstatic.com;" always;

        # SPA (frontend React) - deixa qualquer rota cair no index.html
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Reverse proxy para API (rotas protegidas por JWT no backend)
        # Externo: /api/casos/evolucao -> Interno: /casos/evolucao
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;

            # Remove o prefixo /api ao encaminhar para o backend
            proxy_pass         http://java_api_upstream/;
            proxy_http_version 1.1;

            # Preserva informações do cliente e cabeçalho Authorization (JWT)
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization     $http_authorization;

            proxy_set_header Connection "";

            proxy_connect_timeout  5s;
            proxy_send_timeout     60s;
            proxy_read_timeout     60s;
        }

        # Mapeia /auth/* do frontend para /usuario/* no backend
        # Ex.: /auth/login  -> /usuario/login
        #      /auth/register -> /usuario/register
        location /auth/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass         http://java_api_upstream/usuario/;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization     $http_authorization;

            proxy_set_header Connection "";

            proxy_connect_timeout  5s;
            proxy_send_timeout     60s;
            proxy_read_timeout     60s;
        }

        # Rotas públicas de autenticação acessadas diretamente como
        # /usuario/login, /usuario/register, /usuario/refresh
        # Aqui usamos regex e **removemos** o Authorization para evitar 401
        # quando o interceptor do frontend manda um token inválido/expirado.
        location ~ ^/usuario/(login|register|refresh)$ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass         http://java_api_upstream;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Não encaminhar Authorization nessas rotas públicas
            proxy_set_header Authorization     "";

            proxy_set_header Connection "";

            proxy_connect_timeout  5s;
            proxy_send_timeout     60s;
            proxy_read_timeout     60s;
        }

        # Reverse proxy para o serviço ETL
        # Ex.: /etl/carregar -> etl_java:8081/etl/carregar
        location /etl/ {
            limit_req zone=api_limit burst=5 nodelay;
            client_max_body_size 50m;  # ETL pode receber arquivos maiores

            proxy_pass         http://etl_java_upstream;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization     $http_authorization;

            proxy_set_header Connection "";

            # Timeouts maiores para ETLs longos (evita 504 do Nginx)
            proxy_connect_timeout  30s;
            proxy_send_timeout     3600s;
            proxy_read_timeout     3600s;
            send_timeout           3600s;
        }
    }
}
